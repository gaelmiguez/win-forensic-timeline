[server]
address = "127.0.0.1"
headless = true

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#0071E3"
backgroundColor = "#F5F7FA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#243247"
linkColor = "#005FBF"
borderColor = "#D8DEE8"
showWidgetBorder = true
showSidebarBorder = true
baseRadius = "8px"
buttonRadius = "6px"
font = "sans-serif"
headingFont = "sans-serif"
codeFont = "monospace"
chartCategoricalColors = ["#0071E3", "#5856D6", "#C75C00", "#16856C", "#667085"]
dataframeBorderColor = "#D8DEE8"
dataframeHeaderBackgroundColor = "#EEF2F6"

[theme.sidebar]
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F7FA"
textColor = "#344054"
borderColor = "#D8DEE8"
